<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text Editor</title>
  <script src="../_sdk/peep-sdk.js"></script>
  <style>
    :root {
      --bg-app: #1e1e1e;
      --bg-toolbar: #252526;
      --bg-elevated: #333;
      --bg-hover: #444;
      --border: #333;
      --border-subtle: #555;
      --text-primary: #d4d4d4;
      --text-secondary: #ccc;
      --text-tertiary: #888;
      --accent: #0078d4;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg-app);
      color: var(--text-primary);
      font: 14px/1.6 'SF Mono', 'Fira Code', 'Consolas', monospace;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .toolbar {
      display: flex;
      gap: 8px;
      padding: 8px 12px;
      background: var(--bg-toolbar);
      border-bottom: 1px solid var(--border);
      align-items: center;
    }
    .toolbar button {
      background: var(--bg-elevated);
      color: var(--text-secondary);
      border: 1px solid var(--border-subtle);
      padding: 4px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }
    .toolbar button:hover { background: var(--bg-hover); }
    .toolbar button.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .toolbar .spacer { flex: 1; }
    .toolbar .status { font-size: 11px; color: var(--text-tertiary); }
    #editor {
      flex: 1;
      padding: 12px 16px;
      overflow: auto;
      white-space: pre;
      tab-size: 2;
      outline: none;
    }
    #editor[contenteditable="false"] { cursor: default; }
    #editor[contenteditable="true"] {
      cursor: text;
      background: var(--bg-toolbar);
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <button id="btn-view" class="active" onclick="setMode('view')">View</button>
    <button id="btn-edit" onclick="setMode('edit')">Edit</button>
    <span class="spacer"></span>
    <span class="status" id="status"></span>
  </div>
  <pre id="editor" contenteditable="false"></pre>
  <script>
    let currentMode = 'view';
    let originalContent = '';
    let saveTimeout = null;

    function setMode(mode) {
      currentMode = mode;
      const editor = document.getElementById('editor');
      const btnView = document.getElementById('btn-view');
      const btnEdit = document.getElementById('btn-edit');

      editor.contentEditable = mode === 'edit' ? 'true' : 'false';
      btnView.classList.toggle('active', mode === 'view');
      btnEdit.classList.toggle('active', mode === 'edit');
    }

    function autoSave() {
      clearTimeout(saveTimeout);
      saveTimeout = setTimeout(() => {
        const content = document.getElementById('editor').textContent;
        if (content !== originalContent) {
          PeepSDK.save(content);
          document.getElementById('status').textContent = 'Saved';
          setTimeout(() => {
            document.getElementById('status').textContent = '';
          }, 2000);
        }
      }, 1000);
    }

    PeepSDK.on('init', ({ content, fileName }) => {
      originalContent = content || '';
      document.getElementById('editor').textContent = originalContent;
      document.getElementById('status').textContent = fileName;
      PeepSDK.ready();
    });

    PeepSDK.on('file-changed', ({ content }) => {
      if (currentMode === 'view') {
        originalContent = content;
        document.getElementById('editor').textContent = content;
      }
    });

    document.getElementById('editor').addEventListener('input', () => {
      if (currentMode === 'edit') autoSave();
    });
  </script>
</body>
</html>
