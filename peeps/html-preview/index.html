<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML Preview</title>
  <script src="../_sdk/peep-sdk.js"></script>
  <style>
    :root {
      --bg-app: #1e1e1e;
      --bg-toolbar: #252526;
      --bg-elevated: #333;
      --bg-hover: #444;
      --border: #333;
      --border-subtle: #555;
      --text-primary: #d4d4d4;
      --text-secondary: #ccc;
      --text-tertiary: #888;
      --accent: #0078d4;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg-app);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .toolbar {
      display: flex;
      gap: 8px;
      padding: 8px 12px;
      background: var(--bg-toolbar);
      border-bottom: 1px solid var(--border);
      align-items: center;
    }
    .toolbar button {
      background: var(--bg-elevated);
      color: var(--text-secondary);
      border: 1px solid var(--border-subtle);
      padding: 4px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }
    .toolbar button:hover { background: var(--bg-hover); }
    .toolbar button.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .toolbar .spacer { flex: 1; }
    .toolbar .status { font-size: 11px; color: var(--text-tertiary); }
    #frame-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: auto;
      padding: 16px;
    }
    #preview-frame {
      border: 1px solid var(--border);
      background: #fff;
      transition: width 0.2s, height 0.2s;
    }
    .fit-width #preview-frame { width: 100%; height: 100%; }
    .desktop #preview-frame { width: 1280px; height: 100%; }
    .tablet #preview-frame { width: 768px; height: 100%; }
    .mobile #preview-frame { width: 375px; height: 100%; }
  </style>
</head>
<body class="fit-width">
  <div class="toolbar">
    <button class="active" onclick="setSize('fit-width', this)">Fit</button>
    <button onclick="setSize('desktop', this)">Desktop</button>
    <button onclick="setSize('tablet', this)">Tablet</button>
    <button onclick="setSize('mobile', this)">Mobile</button>
    <span class="spacer"></span>
    <span class="status" id="status"></span>
  </div>
  <div id="frame-container">
    <iframe id="preview-frame" sandbox="allow-scripts"></iframe>
  </div>
  <script>
    function setSize(cls, btn) {
      document.body.className = cls;
      document.querySelectorAll('.toolbar button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }

    PeepSDK.on('init', ({ filePath, fileName }) => {
      const backendUrl = 'http://localhost:8000';
      document.getElementById('preview-frame').src =
        `${backendUrl}/api/file/raw?path=${encodeURIComponent(filePath)}`;
      document.getElementById('status').textContent = fileName;
      PeepSDK.ready();
    });
  </script>
</body>
</html>
