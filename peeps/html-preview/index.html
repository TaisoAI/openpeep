<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML Preview</title>
  <script src="../_sdk/peep-sdk.js"></script>
  <style>
    :root {
      --bg-app: #1e1e1e;
      --bg-toolbar: #252526;
      --bg-elevated: #333;
      --bg-hover: #444;
      --border: #333;
      --border-subtle: #555;
      --text-primary: #d4d4d4;
      --text-secondary: #ccc;
      --text-tertiary: #888;
      --accent: #0078d4;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg-app);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }

    /* Toolbar */
    .toolbar {
      display: flex;
      gap: 4px;
      padding: 6px 10px;
      background: var(--bg-toolbar);
      border-bottom: 1px solid var(--border);
      align-items: center;
      flex-shrink: 0;
    }
    .tb {
      background: var(--bg-elevated);
      color: var(--text-secondary);
      border: 1px solid transparent;
      padding: 3px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      font-family: inherit;
      outline: none;
      white-space: nowrap;
    }
    .tb:hover { background: var(--bg-hover); }
    .tb.active { background: var(--accent); color: #fff; }
    .sep { width: 1px; height: 16px; background: var(--border-subtle); margin: 0 4px; flex-shrink: 0; }
    .spacer { flex: 1; }
    .dim { font-size: 10px; color: var(--text-tertiary); font-family: monospace; white-space: nowrap; }

    /* Device picker dropdown — only visible when its category is active */
    .device-pick {
      display: none;
      position: relative;
      flex-shrink: 0;
    }
    .device-pick.visible { display: block; }
    .device-pick select {
      appearance: none;
      background: var(--bg-elevated);
      color: var(--text-secondary);
      border: 1px solid var(--border-subtle);
      padding: 3px 22px 3px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      font-family: inherit;
      outline: none;
    }
    .device-pick select:hover { background: var(--bg-hover); }
    .device-pick::after {
      content: "▾";
      position: absolute;
      right: 7px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-tertiary);
      font-size: 9px;
      pointer-events: none;
    }

    /* Rotate button — proper screen-rotation icon */
    .rotate-btn {
      display: none;
      padding: 3px 6px;
    }
    .rotate-btn.visible { display: block; }
    .rotate-btn svg { width: 14px; height: 14px; display: block; }

    /* Container */
    #container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 0;
      position: relative;
      overflow: hidden;
    }

    /* Fill mode */
    body.mode-fill #fill-frame { display: block; width: 100%; height: 100%; border: none; }
    body:not(.mode-fill) #fill-frame { display: none; }

    /* Fit mode */
    body.mode-fit #container {
      padding: 24px;
      background: repeating-conic-gradient(#2a2a2a 0% 25%, #242424 0% 50%) 50% / 16px 16px;
    }
    #fit-frame {
      display: none;
      position: absolute;
      border: 1px solid #444;
      border-radius: 4px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.5);
      background: #fff;
      transform-origin: 0 0;
    }
    body.mode-fit #fit-frame { display: block; }

    /* Device mode */
    body.mode-device #container {
      padding: 24px;
      background: repeating-conic-gradient(#2a2a2a 0% 25%, #242424 0% 50%) 50% / 16px 16px;
    }
    #device-wrapper {
      display: none;
      flex-direction: column;
      align-items: center;
    }
    body.mode-device #device-wrapper { display: flex; }

    /* --- Monitor frame --- */
    .monitor-body {
      background: linear-gradient(180deg, #141414 0%, #080808 100%);
      border-radius: 12px;
      padding: 8px 8px 24px 8px;
      box-shadow:
        0 8px 32px rgba(0,0,0,0.6),
        0 2px 8px rgba(0,0,0,0.4),
        inset 0 1px 0 rgba(255,255,255,0.08),
        inset 0 0 0 1px rgba(255,255,255,0.06);
      position: relative;
    }
    .monitor-body iframe {
      display: block;
      border-radius: 2px;
      border: none;
      background: #fff;
    }
    .monitor-body .webcam {
      position: absolute;
      bottom: 9px;
      left: 50%;
      transform: translateX(-50%);
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #1a1a1a;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.1);
    }
    .monitor-neck {
      width: 0;
      height: 0;
      border-left: 40px solid transparent;
      border-right: 40px solid transparent;
      border-top: 28px solid #0a0a0a;
      margin: 0 auto;
    }
    .monitor-base {
      width: 130px;
      height: 6px;
      background: linear-gradient(180deg, #0e0e0e 0%, #080808 100%);
      border-radius: 0 0 6px 6px;
      margin: 0 auto;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }

    /* --- Tablet frame --- */
    .tablet-body {
      background: linear-gradient(180deg, #141414 0%, #080808 100%);
      border-radius: 18px;
      padding: 14px;
      box-shadow:
        0 8px 32px rgba(0,0,0,0.6),
        0 2px 8px rgba(0,0,0,0.4),
        inset 0 1px 0 rgba(255,255,255,0.08),
        inset 0 0 0 1px rgba(255,255,255,0.06);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .tablet-body iframe {
      display: block;
      border-radius: 4px;
      border: none;
      background: #fff;
    }
    .tablet-body .camera-pill {
      width: 8px;
      height: 8px;
      background: #111;
      border-radius: 50%;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
    }
    .tablet-body .home-indicator {
      width: 50px;
      height: 4px;
      background: #444;
      border-radius: 2px;
    }

    /* --- Phone frame --- */
    .phone-body {
      background: linear-gradient(180deg, #141414 0%, #080808 100%);
      border-radius: 36px;
      padding: 14px 8px;
      box-shadow:
        0 8px 32px rgba(0,0,0,0.6),
        0 2px 8px rgba(0,0,0,0.4),
        inset 0 1px 0 rgba(255,255,255,0.08),
        inset 0 0 0 1px rgba(255,255,255,0.06);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .phone-body iframe {
      display: block;
      border-radius: 24px;
      border: none;
      background: #000;
    }
    .phone-body .dynamic-island {
      width: 72px;
      height: 20px;
      background: #000;
      border-radius: 12px;
      position: relative;
      margin-bottom: 2px;
    }
    .phone-body .dynamic-island::before {
      content: '';
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #0a1628;
    }
    .phone-body .dynamic-island::after {
      content: '';
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #0a1628;
      border: 1px solid #111;
    }
    .phone-body .home-indicator {
      width: 36px;
      height: 4px;
      background: #555;
      border-radius: 2px;
      margin-top: 2px;
    }

    /* Device label */
    .device-info {
      margin-top: 12px;
      font-size: 10px;
      color: var(--text-tertiary);
      font-family: monospace;
      text-align: center;
    }
  </style>
</head>
<body class="mode-fill">
  <div class="toolbar">
    <button class="tb active" id="btn-fill" onclick="setMode('fill')">Fill</button>
    <button class="tb" id="btn-fit" onclick="setMode('fit')">Fit</button>
    <span class="sep"></span>

    <!-- Category buttons — click to activate + show that category's dropdown -->
    <button class="tb" id="btn-desktop" onclick="activateCategory('desktop')">Desktop</button>
    <button class="tb" id="btn-tablet" onclick="activateCategory('tablet')">Tablet</button>
    <button class="tb" id="btn-phone" onclick="activateCategory('phone')">Phone</button>

    <!-- Device pickers — only one visible at a time -->
    <div class="device-pick" id="pick-desktop">
      <select id="sel-desktop" onchange="pickDevice(this.value)">
        <option value="laptop-sm">1280 × 800</option>
        <option value="laptop" selected>1440 × 900</option>
        <option value="fhd">1920 × 1080</option>
        <option value="ultrawide">2560 × 1080</option>
      </select>
    </div>
    <div class="device-pick" id="pick-tablet">
      <select id="sel-tablet" onchange="pickDevice(this.value)">
        <option value="ipad-pro-13">iPad Pro 13"</option>
        <option value="ipad-pro-11">iPad Pro 11"</option>
        <option value="ipad-air" selected>iPad Air</option>
        <option value="ipad-mini">iPad mini</option>
      </select>
    </div>
    <div class="device-pick" id="pick-phone">
      <select id="sel-phone" onchange="pickDevice(this.value)">
        <option value="iphone-16-pro-max">iPhone 16 Pro Max</option>
        <option value="iphone-16-pro">iPhone 16 Pro</option>
        <option value="iphone-16" selected>iPhone 16</option>
        <option value="iphone-se">iPhone SE</option>
      </select>
    </div>

    <!-- Rotate: screen rotation icon (rectangle with corner arrow) -->
    <button class="tb rotate-btn" id="btn-rotate" onclick="toggleRotation()" title="Rotate orientation">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="4" y="2" width="16" height="20" rx="2"/>
        <path d="M15 5l2 2-2 2" opacity="0.5"/>
        <path d="M12 7h5" opacity="0.5"/>
      </svg>
    </button>

    <span class="dim" id="dim-label"></span>
    <span class="spacer"></span>
    <span class="dim" id="status"></span>
  </div>

  <div id="container">
    <iframe id="fill-frame" sandbox="allow-scripts"></iframe>
    <iframe id="fit-frame" sandbox="allow-scripts"></iframe>
    <div id="device-wrapper"></div>
  </div>

  <script>
    const DEVICES = {
      "laptop-sm":  { w: 1280, h: 800,  label: "Laptop 1280×800",    type: "monitor", cat: "desktop" },
      "laptop":     { w: 1440, h: 900,  label: "Laptop 1440×900",    type: "monitor", cat: "desktop" },
      "fhd":        { w: 1920, h: 1080, label: "FHD 1920×1080",      type: "monitor", cat: "desktop" },
      "ultrawide":  { w: 2560, h: 1080, label: "Ultrawide 2560×1080",type: "monitor", cat: "desktop" },

      "ipad-pro-13": { w: 1024, h: 1366, label: 'iPad Pro 13"', type: "tablet", cat: "tablet" },
      "ipad-pro-11": { w: 834,  h: 1194, label: 'iPad Pro 11"', type: "tablet", cat: "tablet" },
      "ipad-air":    { w: 820,  h: 1180, label: "iPad Air",     type: "tablet", cat: "tablet" },
      "ipad-mini":   { w: 744,  h: 1133, label: "iPad mini",    type: "tablet", cat: "tablet" },

      "iphone-16-pro-max": { w: 440, h: 956, label: "iPhone 16 Pro Max", type: "phone", cat: "phone" },
      "iphone-16-pro":     { w: 402, h: 874, label: "iPhone 16 Pro",     type: "phone", cat: "phone" },
      "iphone-16":         { w: 393, h: 852, label: "iPhone 16",         type: "phone", cat: "phone" },
      "iphone-se":         { w: 375, h: 667, label: "iPhone SE",         type: "phone", cat: "phone" },
    };

    let currentSrc = "";
    let currentMode = "fill";
    let currentCat = "";
    let currentDeviceId = "";
    let isLandscape = false;

    /* --- Toolbar state --- */

    function deactivateAll() {
      document.getElementById('btn-fill').classList.remove('active');
      document.getElementById('btn-fit').classList.remove('active');
      document.getElementById('btn-desktop').classList.remove('active');
      document.getElementById('btn-tablet').classList.remove('active');
      document.getElementById('btn-phone').classList.remove('active');
      document.querySelectorAll('.device-pick').forEach(el => el.classList.remove('visible'));
      document.getElementById('btn-rotate').classList.remove('visible');
    }

    /* --- Fill / Fit --- */

    function setMode(mode) {
      deactivateAll();
      currentMode = mode;
      currentCat = "";
      currentDeviceId = "";
      isLandscape = false;
      document.body.className = 'mode-' + mode;
      document.getElementById('btn-' + mode).classList.add('active');
      document.getElementById('dim-label').textContent = '';
      document.getElementById('device-wrapper').innerHTML = '';
      document.getElementById('device-wrapper').style.cssText = '';
      document.getElementById('fit-frame').style.cssText = '';

      if (mode === 'fill') {
        document.getElementById('fill-frame').src = currentSrc;
      } else if (mode === 'fit') {
        document.getElementById('fill-frame').src = '';
        applyFit();
      }
    }

    function applyFit() {
      const frame = document.getElementById('fit-frame');
      const ct = document.getElementById('container');
      const pad = 24;
      const W = 1440, H = 900;
      frame.style.width = W + 'px';
      frame.style.height = H + 'px';
      frame.src = currentSrc;

      requestAnimationFrame(() => {
        const cw = ct.clientWidth - pad * 2;
        const ch = ct.clientHeight - pad * 2;
        const scale = Math.min(cw / W, ch / H, 1);
        frame.style.transform = `scale(${scale})`;
        frame.style.left = (pad + (cw - W * scale) / 2) + 'px';
        frame.style.top = (pad + (ch - H * scale) / 2) + 'px';
        updateDim(W, H);
      });
    }

    /* --- Device categories --- */

    function activateCategory(cat) {
      deactivateAll();
      currentMode = 'device';
      currentCat = cat;
      isLandscape = false;
      document.body.className = 'mode-device';
      document.getElementById('fill-frame').src = '';
      document.getElementById('fit-frame').style.cssText = '';

      // Highlight category button + show its picker
      document.getElementById('btn-' + cat).classList.add('active');
      document.getElementById('pick-' + cat).classList.add('visible');

      // Show rotate for tablet/phone
      if (cat !== 'desktop') {
        document.getElementById('btn-rotate').classList.add('visible');
      }

      // Use whatever is currently selected in that dropdown
      const sel = document.getElementById('sel-' + cat);
      currentDeviceId = sel.value;
      renderDevice();
    }

    function pickDevice(deviceId) {
      currentDeviceId = deviceId;
      isLandscape = false;
      renderDevice();
    }

    function toggleRotation() {
      isLandscape = !isLandscape;
      renderDevice();
    }

    /* --- Render device frame --- */

    function renderDevice() {
      const dev = DEVICES[currentDeviceId];
      if (!dev) return;

      let w = dev.w, h = dev.h;
      if (isLandscape) [w, h] = [h, w];

      const wrapper = document.getElementById('device-wrapper');
      const ct = document.getElementById('container');
      let html = '';

      if (dev.type === 'monitor') {
        html = `
          <div class="monitor-body">
            <iframe sandbox="allow-scripts" width="${w}" height="${h}"></iframe>
            <div class="webcam"></div>
          </div>
          <div class="monitor-neck"></div>
          <div class="monitor-base"></div>`;
      } else if (dev.type === 'tablet') {
        html = `
          <div class="tablet-body">
            <div class="camera-pill"></div>
            <iframe sandbox="allow-scripts" width="${w}" height="${h}"></iframe>
            <div class="home-indicator"></div>
          </div>`;
      } else if (dev.type === 'phone') {
        html = `
          <div class="phone-body">
            <div class="dynamic-island"></div>
            <iframe sandbox="allow-scripts" width="${w}" height="${h}"></iframe>
            <div class="home-indicator"></div>
          </div>`;
      }

      const orient = (dev.type !== 'monitor') ? (isLandscape ? ' Landscape' : ' Portrait') : '';
      html += `<div class="device-info">${dev.label}${orient} — ${w} × ${h}</div>`;
      wrapper.innerHTML = html;

      const iframe = wrapper.querySelector('iframe');
      if (iframe && currentSrc) iframe.src = currentSrc;
      updateDim(w, h);

      // Scale to fit container
      requestAnimationFrame(() => {
        wrapper.style.transform = 'none';
        const rect = wrapper.getBoundingClientRect();
        const pad = 48;
        const cw = ct.clientWidth - pad;
        const ch = ct.clientHeight - pad;
        const scale = Math.min(cw / rect.width, ch / rect.height, 1);
        wrapper.style.transform = `scale(${scale})`;
        wrapper.style.transformOrigin = 'center center';
      });
    }

    function updateDim(w, h) {
      document.getElementById('dim-label').textContent = `${w} × ${h}`;
    }

    window.addEventListener('resize', () => {
      if (currentMode === 'fit') applyFit();
      if (currentMode === 'device') renderDevice();
    });

    PeepSDK.on('init', ({ filePath, fileName }) => {
      const backendUrl = 'http://localhost:8000';
      currentSrc = `${backendUrl}/api/file/raw?path=${encodeURIComponent(filePath)}`;
      document.getElementById('fill-frame').src = currentSrc;
      document.getElementById('status').textContent = fileName;
      PeepSDK.ready();
    });
  </script>
</body>
</html>
