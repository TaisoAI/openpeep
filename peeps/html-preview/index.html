<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML Preview</title>
  <script src="../_sdk/peep-sdk.js"></script>
  <style>
    :root {
      --bg-app: #1e1e1e;
      --bg-toolbar: #252526;
      --bg-elevated: #333;
      --bg-hover: #444;
      --border: #333;
      --border-subtle: #555;
      --text-primary: #d4d4d4;
      --text-secondary: #ccc;
      --text-tertiary: #888;
      --accent: #0078d4;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg-app);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }

    /* Toolbar */
    .toolbar {
      display: flex;
      gap: 4px;
      padding: 6px 10px;
      background: var(--bg-toolbar);
      border-bottom: 1px solid var(--border);
      align-items: center;
      flex-shrink: 0;
    }
    .tb {
      background: var(--bg-elevated);
      color: var(--text-secondary);
      border: 1px solid transparent;
      padding: 3px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      font-family: inherit;
      outline: none;
      white-space: nowrap;
    }
    .tb:hover { background: var(--bg-hover); }
    .tb.active { background: var(--accent); color: #fff; }
    .sep { width: 1px; height: 16px; background: var(--border-subtle); margin: 0 4px; flex-shrink: 0; }
    .spacer { flex: 1; }
    .dim { font-size: 10px; color: var(--text-tertiary); font-family: monospace; white-space: nowrap; }

    .device-pick {
      display: none;
      position: relative;
      flex-shrink: 0;
    }
    .device-pick.visible { display: block; }
    .device-pick select {
      appearance: none;
      background: var(--bg-elevated);
      color: var(--text-secondary);
      border: 1px solid var(--border-subtle);
      padding: 3px 22px 3px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      font-family: inherit;
      outline: none;
    }
    .device-pick select:hover { background: var(--bg-hover); }
    .device-pick::after {
      content: "▾";
      position: absolute;
      right: 7px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-tertiary);
      font-size: 9px;
      pointer-events: none;
    }

    .rotate-btn {
      display: none;
      padding: 3px 6px;
    }
    .rotate-btn.visible { display: block; }
    .rotate-btn svg { width: 14px; height: 14px; display: block; }

    /* Container */
    #container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 0;
      position: relative;
      overflow: hidden;
    }
    #container.has-bg {
      padding: 24px;
      background: repeating-conic-gradient(#383838 0% 25%, #303030 0% 50%) 50% / 16px 16px;
      overflow: auto;
    }

    /* Raw iframe (fill with no device, or fit with no device) */
    #raw-frame {
      display: none;
      border: none;
    }
    #raw-frame.show { display: block; }
    #raw-frame.fill { width: 100%; height: 100%; }
    #raw-frame.fit {
      position: absolute;
      border: 1px solid #444;
      border-radius: 4px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.5);
      background: #fff;
      transform-origin: 0 0;
    }

    /* Device wrapper */
    #device-wrapper {
      display: none;
      flex-direction: column;
      align-items: center;
    }
    #device-wrapper.show { display: flex; }

    /* --- Monitor frame --- */
    .monitor-body {
      background: linear-gradient(180deg, #141414 0%, #080808 100%);
      border-radius: 14px;
      padding: 14px 14px 32px 14px;
      box-shadow:
        0 8px 32px rgba(0,0,0,0.6),
        0 2px 8px rgba(0,0,0,0.4),
        inset 0 1px 0 rgba(255,255,255,0.08),
        inset 0 0 0 1px rgba(255,255,255,0.06);
      position: relative;
    }
    .monitor-body iframe {
      display: block;
      border-radius: 2px;
      border: none;
      background: #fff;
    }
    .monitor-body .webcam {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #1a1a1a;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.1);
    }
    .monitor-neck {
      width: 0;
      height: 0;
      border-left: 50px solid transparent;
      border-right: 50px solid transparent;
      border-top: 32px solid #0a0a0a;
      margin: 0 auto;
    }
    .monitor-base {
      width: 150px;
      height: 8px;
      background: linear-gradient(180deg, #0e0e0e 0%, #080808 100%);
      border-radius: 0 0 6px 6px;
      margin: 0 auto;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }

    /* --- Tablet frame --- */
    .tablet-body {
      background: linear-gradient(180deg, #141414 0%, #080808 100%);
      border-radius: 18px;
      padding: 14px;
      box-shadow:
        0 8px 32px rgba(0,0,0,0.6),
        0 2px 8px rgba(0,0,0,0.4),
        inset 0 1px 0 rgba(255,255,255,0.08),
        inset 0 0 0 1px rgba(255,255,255,0.06);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .tablet-body iframe { display: block; border-radius: 4px; border: none; background: #fff; }
    .tablet-body .camera-pill { width: 8px; height: 8px; background: #111; border-radius: 50%; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08); }
    .tablet-body .home-indicator { width: 50px; height: 4px; background: #444; border-radius: 2px; }
    .tablet-body.landscape { flex-direction: row; }
    .tablet-body.landscape .camera-pill { align-self: center; }
    .tablet-body.landscape .home-indicator { width: 4px; height: 50px; align-self: center; }

    /* --- Phone frame --- */
    .phone-body {
      background: linear-gradient(180deg, #141414 0%, #080808 100%);
      border-radius: 36px;
      padding: 14px 8px;
      box-shadow:
        0 8px 32px rgba(0,0,0,0.6),
        0 2px 8px rgba(0,0,0,0.4),
        inset 0 1px 0 rgba(255,255,255,0.08),
        inset 0 0 0 1px rgba(255,255,255,0.06);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .phone-body iframe { display: block; border-radius: 24px; border: none; background: #000; }
    .phone-body .dynamic-island {
      width: 72px; height: 20px; background: #000; border-radius: 12px; position: relative; margin-bottom: 2px;
    }
    .phone-body .dynamic-island::before {
      content: ''; position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
      width: 4px; height: 4px; border-radius: 50%; background: #0a1628;
    }
    .phone-body .dynamic-island::after {
      content: ''; position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      width: 5px; height: 5px; border-radius: 50%; background: #0a1628; border: 1px solid #111;
    }
    .phone-body .home-indicator { width: 36px; height: 4px; background: #555; border-radius: 2px; margin-top: 2px; }
    /* Phone landscape */
    .phone-body.landscape { flex-direction: row; padding: 8px 14px; }
    .phone-body.landscape .dynamic-island { width: 20px; height: 72px; margin-bottom: 0; margin-right: 4px; }
    .phone-body.landscape .dynamic-island::before { left: 50%; top: 16px; transform: translateX(-50%); }
    .phone-body.landscape .dynamic-island::after { right: auto; left: 50%; top: auto; bottom: 14px; transform: translateX(-50%); }
    .phone-body.landscape .home-indicator { width: 4px; height: 36px; margin-top: 0; margin-left: 4px; align-self: center; }

    .device-info {
      margin-top: 12px;
      font-size: 10px;
      color: var(--text-tertiary);
      font-family: monospace;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <!-- Zoom -->
    <button class="tb" id="btn-free" onclick="setZoom('free')">Free</button>
    <button class="tb active" id="btn-fill" onclick="setZoom('fill')">Fill</button>
    <button class="tb" id="btn-fit" onclick="setZoom('fit')">Fit</button>
    <span class="sep"></span>

    <!-- Device: click to toggle, click again to deselect -->
    <button class="tb" id="btn-desktop" onclick="toggleCategory('desktop')">Desktop</button>
    <button class="tb" id="btn-tablet" onclick="toggleCategory('tablet')">Tablet</button>
    <button class="tb" id="btn-phone" onclick="toggleCategory('phone')">Phone</button>

    <div class="device-pick" id="pick-desktop">
      <select id="sel-desktop" onchange="pickDevice(this.value)">
        <option value="laptop-sm">1280 × 800</option>
        <option value="laptop" selected>1440 × 900</option>
        <option value="fhd">1920 × 1080</option>
        <option value="ultrawide">2560 × 1080</option>
      </select>
    </div>
    <div class="device-pick" id="pick-tablet">
      <select id="sel-tablet" onchange="pickDevice(this.value)">
        <option value="ipad-pro-13">iPad Pro 13"</option>
        <option value="ipad-pro-11">iPad Pro 11"</option>
        <option value="ipad-air" selected>iPad Air</option>
        <option value="ipad-mini">iPad mini</option>
      </select>
    </div>
    <div class="device-pick" id="pick-phone">
      <select id="sel-phone" onchange="pickDevice(this.value)">
        <option value="iphone-17-pro-max">iPhone 17 Pro Max</option>
        <option value="iphone-17-pro">iPhone 17 Pro</option>
        <option value="iphone-17" selected>iPhone 17</option>
        <option value="iphone-17-air">iPhone 17 Air</option>
        <option value="iphone-16e">iPhone 16e</option>
        <option value="iphone-16-pro-max">iPhone 16 Pro Max</option>
        <option value="iphone-16-pro">iPhone 16 Pro</option>
        <option value="iphone-16">iPhone 16</option>
        <option value="iphone-se">iPhone SE</option>
      </select>
    </div>

    <button class="tb rotate-btn" id="btn-rotate" onclick="toggleRotation()" title="Rotate orientation">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="4" y="2" width="16" height="20" rx="2"/>
        <path d="M15 5l2 2-2 2" opacity="0.5"/>
        <path d="M12 7h5" opacity="0.5"/>
      </svg>
    </button>

    <span class="dim" id="dim-label"></span>
    <span class="spacer"></span>
    <span class="dim" id="status"></span>
  </div>

  <div id="container">
    <iframe id="raw-frame" sandbox="allow-scripts"></iframe>
    <div id="device-wrapper"></div>
  </div>

  <script>
    const DEVICES = {
      "laptop-sm":  { w: 1280, h: 800,  label: "Laptop 1280×800",    type: "monitor", cat: "desktop" },
      "laptop":     { w: 1440, h: 900,  label: "Laptop 1440×900",    type: "monitor", cat: "desktop" },
      "fhd":        { w: 1920, h: 1080, label: "FHD 1920×1080",      type: "monitor", cat: "desktop" },
      "ultrawide":  { w: 2560, h: 1080, label: "Ultrawide 2560×1080",type: "monitor", cat: "desktop" },

      "ipad-pro-13": { w: 1024, h: 1366, label: 'iPad Pro 13"', type: "tablet", cat: "tablet" },
      "ipad-pro-11": { w: 834,  h: 1194, label: 'iPad Pro 11"', type: "tablet", cat: "tablet" },
      "ipad-air":    { w: 820,  h: 1180, label: "iPad Air",     type: "tablet", cat: "tablet" },
      "ipad-mini":   { w: 744,  h: 1133, label: "iPad mini",    type: "tablet", cat: "tablet" },

      "iphone-17-pro-max": { w: 440, h: 956, label: "iPhone 17 Pro Max", type: "phone", cat: "phone" },
      "iphone-17-pro":     { w: 402, h: 874, label: "iPhone 17 Pro",     type: "phone", cat: "phone" },
      "iphone-17":         { w: 402, h: 874, label: "iPhone 17",         type: "phone", cat: "phone" },
      "iphone-17-air":     { w: 420, h: 912, label: "iPhone 17 Air",     type: "phone", cat: "phone" },
      "iphone-16e":        { w: 390, h: 844, label: "iPhone 16e",        type: "phone", cat: "phone" },
      "iphone-16-pro-max": { w: 440, h: 956, label: "iPhone 16 Pro Max", type: "phone", cat: "phone" },
      "iphone-16-pro":     { w: 402, h: 874, label: "iPhone 16 Pro",     type: "phone", cat: "phone" },
      "iphone-16":         { w: 393, h: 852, label: "iPhone 16",         type: "phone", cat: "phone" },
      "iphone-se":         { w: 375, h: 667, label: "iPhone SE",         type: "phone", cat: "phone" },
    };

    let currentSrc = "";
    let zoom = "fill";       // "free", "fill", or "fit" — how to scale
    let deviceId = "";       // "" = no device, or a DEVICES key
    let deviceCat = "";      // "desktop", "tablet", "phone", or ""
    let isLandscape = false;

    /* --- UI helpers --- */

    function updateToolbar() {
      document.getElementById('btn-free').classList.toggle('active', zoom === 'free');
      document.getElementById('btn-fill').classList.toggle('active', zoom === 'fill');
      document.getElementById('btn-fit').classList.toggle('active', zoom === 'fit');

      document.getElementById('btn-desktop').classList.toggle('active', deviceCat === 'desktop');
      document.getElementById('btn-tablet').classList.toggle('active', deviceCat === 'tablet');
      document.getElementById('btn-phone').classList.toggle('active', deviceCat === 'phone');

      document.querySelectorAll('.device-pick').forEach(el => el.classList.remove('visible'));
      if (deviceCat) document.getElementById('pick-' + deviceCat).classList.add('visible');

      const showRotate = (deviceCat === 'tablet' || deviceCat === 'phone');
      document.getElementById('btn-rotate').classList.toggle('visible', showRotate);
    }

    /* --- Zoom (fill/fit) --- */

    function setZoom(z) {
      zoom = z;
      updateToolbar();
      render();
    }

    /* --- Device selection --- */

    function toggleCategory(cat) {
      if (deviceCat === cat) {
        // Clicking active category deselects device
        deviceCat = "";
        deviceId = "";
        isLandscape = false;
      } else {
        deviceCat = cat;
        isLandscape = false;
        deviceId = document.getElementById('sel-' + cat).value;
      }
      updateToolbar();
      render();
    }

    function pickDevice(id) {
      deviceId = id;
      isLandscape = false;
      render();
    }

    function toggleRotation() {
      isLandscape = !isLandscape;
      render();
    }

    /* --- Main render — decides what to show based on zoom + device --- */

    function render() {
      const ct = document.getElementById('container');
      const raw = document.getElementById('raw-frame');
      const wrapper = document.getElementById('device-wrapper');

      // Reset
      raw.className = '';
      raw.style.cssText = '';
      raw.src = '';
      wrapper.innerHTML = '';
      wrapper.className = '';
      wrapper.style.cssText = '';
      ct.classList.remove('has-bg');
      document.getElementById('dim-label').textContent = '';

      // Free mode: always full viewport, ignore device
      if (zoom === 'free') {
        wrapper.style.display = 'none';
        raw.className = 'show fill';
        raw.src = currentSrc;
        return;
      }

      if (!deviceId) {
        // --- No device: raw iframe ---
        wrapper.style.display = 'none';

        if (zoom === 'fill') {
          raw.className = 'show fill';
          raw.src = currentSrc;
        } else {
          ct.classList.add('has-bg');
          const W = 1440, H = 900;
          raw.className = 'show fit';
          raw.style.width = W + 'px';
          raw.style.height = H + 'px';
          raw.src = currentSrc;
          requestAnimationFrame(() => fitElement(raw, ct, W, H, 24));
          updateDim(W, H);
        }
      } else {
        // --- Device selected: build device frame ---
        raw.style.display = 'none';
        ct.classList.add('has-bg');

        const dev = DEVICES[deviceId];
        if (!dev) return;

        let w = dev.w, h = dev.h;
        if (isLandscape) [w, h] = [h, w];

        wrapper.className = 'show';
        wrapper.innerHTML = buildDeviceHTML(dev, w, h);

        const iframe = wrapper.querySelector('iframe');
        if (iframe && currentSrc) iframe.src = currentSrc;
        updateDim(w, h);

        requestAnimationFrame(() => {
          wrapper.style.transform = 'none';
          const rect = wrapper.getBoundingClientRect();
          const pad = 48;
          const cw = ct.clientWidth - pad;
          const ch = ct.clientHeight - pad;
          let scale;
          if (zoom === 'fill') {
            // Fill: scale to fill container (cover — match largest dimension)
            scale = Math.max(cw / rect.width, ch / rect.height);
          } else {
            // Fit: scale to fit entirely (contain — match smallest dimension)
            scale = Math.min(cw / rect.width, ch / rect.height, 1);
          }
          wrapper.style.transform = `scale(${scale})`;
          wrapper.style.transformOrigin = 'center center';
        });
      }
    }

    function fitElement(el, ct, W, H, pad) {
      const cw = ct.clientWidth - pad * 2;
      const ch = ct.clientHeight - pad * 2;
      const scale = Math.min(cw / W, ch / H, 1);
      el.style.transform = `scale(${scale})`;
      el.style.left = (pad + (cw - W * scale) / 2) + 'px';
      el.style.top = (pad + (ch - H * scale) / 2) + 'px';
      updateDim(W, H);
    }

    function buildDeviceHTML(dev, w, h) {
      let html = '';
      if (dev.type === 'monitor') {
        html = `
          <div class="monitor-body">
            <iframe sandbox="allow-scripts" width="${w}" height="${h}"></iframe>
            <div class="webcam"></div>
          </div>
          <div class="monitor-neck"></div>
          <div class="monitor-base"></div>`;
      } else if (dev.type === 'tablet') {
        const cls = isLandscape ? 'tablet-body landscape' : 'tablet-body';
        html = `
          <div class="${cls}">
            <div class="camera-pill"></div>
            <iframe sandbox="allow-scripts" width="${w}" height="${h}"></iframe>
            <div class="home-indicator"></div>
          </div>`;
      } else if (dev.type === 'phone') {
        const cls = isLandscape ? 'phone-body landscape' : 'phone-body';
        html = `
          <div class="${cls}">
            <div class="dynamic-island"></div>
            <iframe sandbox="allow-scripts" width="${w}" height="${h}"></iframe>
            <div class="home-indicator"></div>
          </div>`;
      }
      const orient = (dev.type !== 'monitor') ? (isLandscape ? ' Landscape' : ' Portrait') : '';
      html += `<div class="device-info">${dev.label}${orient} — ${w} × ${h}</div>`;
      return html;
    }

    function updateDim(w, h) {
      document.getElementById('dim-label').textContent = `${w} × ${h}`;
    }

    window.addEventListener('resize', () => render());

    PeepSDK.on('init', ({ filePath, fileName }) => {
      currentSrc = PeepSDK.rawFileUrl(filePath);
      document.getElementById('status').textContent = fileName;
      render();
    });
  </script>
</body>
</html>
