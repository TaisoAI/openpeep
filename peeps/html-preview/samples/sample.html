<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sample Page</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      max-width: 640px;
      margin: 40px auto;
      padding: 0 20px;
      color: #333;
      line-height: 1.6;
    }
    h1 { color: #7c3aed; }
    .card {
      background: #f8f8fc;
      border: 1px solid #e8e8f0;
      border-radius: 12px;
      padding: 20px;
      margin: 20px 0;
    }
    .badge {
      display: inline-block;
      background: #7c3aed;
      color: white;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
    }
    code {
      background: #f0f0f8;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <h1>Hello, OpenPeep!</h1>
  <p>This is a sample HTML page rendered in the <strong>HTML Preview</strong> peep.</p>

  <div class="card">
    <h3>Features</h3>
    <ul>
      <li>Live HTML rendering</li>
      <li>CSS styling support</li>
      <li>Responsive layout preview</li>
    </ul>
    <span class="badge">HTML Preview</span>
  </div>

  <p>Edit the source and see changes reflected in real-time. Supports <code>&lt;style&gt;</code> tags and inline styles.</p>
</body>
</html>
