<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Player</title>
  <script src="../_sdk/peep-sdk.js"></script>
  <style>
    :root {
      --bg-app: #1e1e1e;
      --bg-toolbar: #252526;
      --bg-elevated: #333;
      --bg-hover: #444;
      --border: #333;
      --border-subtle: #555;
      --text-primary: #d4d4d4;
      --text-secondary: #ccc;
      --text-tertiary: #888;
      --accent: #0078d4;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg-app);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }
    video {
      max-width: 100%;
      max-height: 100%;
      outline: none;
    }
    .info {
      position: fixed;
      bottom: 8px;
      right: 12px;
      color: var(--text-tertiary);
      font: 12px/1 monospace;
    }
  </style>
</head>
<body>
  <video id="player" controls preload="metadata"></video>
  <div class="info" id="info"></div>
  <script>
    PeepSDK.on('init', ({ filePath, fileName }) => {
      const player = document.getElementById('player');
      const info = document.getElementById('info');
      const backendUrl = 'http://localhost:8000';

      player.src = `${backendUrl}/api/file/raw?path=${encodeURIComponent(filePath)}`;

      player.onloadedmetadata = () => {
        const w = player.videoWidth;
        const h = player.videoHeight;
        const dur = formatDuration(player.duration);
        info.textContent = `${w}\u00d7${h} \u2022 ${dur}`;
        PeepSDK.ready();
      };

      player.onerror = () => {
        info.textContent = `Cannot play: ${fileName}`;
        PeepSDK.ready();
      };
    });

    function formatDuration(s) {
      const m = Math.floor(s / 60);
      const sec = Math.floor(s % 60);
      return `${m}:${sec.toString().padStart(2, '0')}`;
    }
  </script>
</body>
</html>
